name: Build and Deploy APK

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Debug Environment
        run: |
          node -v
          npm -v
          npx vite -v

      - name: Build web app
        run: npm run build

      - name: Debug dist folder
        run: |
          ls -la
          ls -R dist || echo "dist NOT FOUND"

      - name: Capacitor Sync
        run: npx cap sync android

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload to Firebase App Distribution
        uses: w9jds/firebase-action@master
        with:
          args: appdistribution:distribute android/app/build/outputs/apk/debug/app-debug.apk --app 1:31851441287:android:bca265dc6b0d89b148dc22
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
